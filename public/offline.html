<!DOCTYPE html>
<html lang="en-GH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Palm Shades</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #faf7f2 0%, #ffffff 55%, #e8d5b5 100%);
        color: #141414;
      }
      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid #e8d5b5;
        border-radius: 20px;
        padding: 40px 28px;
        box-shadow: 0 20px 45px -25px rgba(197, 165, 114, 0.35);
      }
      .brand {
        font-size: 12px;
        letter-spacing: 0.22em;
        font-weight: 700;
        color: #9a7b4f;
        text-transform: uppercase;
      }
      h1 { font-size: 22px; margin: 14px 0 8px; font-family: Georgia, serif; }
      p { font-size: 14px; line-height: 1.6; color: #5c5c5c; margin: 0 0 24px; font-family: system-ui, sans-serif; }
      .icon {
        width: 56px; height: 56px; margin: 0 auto 18px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: #f5efe6; color: #1e3d34; font-size: 26px;
      }
      button {
        width: 100%;
        padding: 13px 18px;
        font-size: 14px;
        font-weight: 600;
        color: #141414;
        background: #c5a572;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s ease;
        font-family: system-ui, sans-serif;
      }
      button:hover { background: #b8925a; }
      .hint { margin-top: 18px; font-size: 12px; color: #9a7b4f; font-family: system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#128064;</div>
      <p class="brand">Palm Shades</p>
      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Pages and eyewear
        you've already viewed are still available — reconnect to see the latest
        from the boutique.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">Your cart is saved on this device.</p>
    </div>
  </body>
</html>
